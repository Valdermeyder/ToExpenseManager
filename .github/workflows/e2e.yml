name: E2E tests

on: push

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        cache: 'npm'
    - name: install
      run: npm ci
    - name: Run e2e tests
      uses: DevExpress/testcafe-action@latest
      with:
        args: chrome ./e2e/*.js --app "npm run build && npm start"
