name: Node CI

on: push

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        cache: 'npm'
    - name: install
      run: npm ci   
    - name: lint
      run: npm run lint
    - name: test
      run: npm test --ci
      env:
        CI: true
